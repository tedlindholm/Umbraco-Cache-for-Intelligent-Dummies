  <rect width="720" height="928" fill="white"/>
<path d="M360,112 C360,139 360,139 360,166" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<path d="M360,230 C360,257 360,257 360,284" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<path d="M360,348 C360,375 360,375 360,402" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<path d="M360,466 C360,493 360,493 360,520" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<rect x="205" y="48" width="310" height="64" rx="10" fill="#f3f4fb" stroke="none" stroke-width="0" filter="url(#soft)"/>
<rect x="205" y="48" width="6" height="64" rx="3" fill="url(#lineGrad)"/>
<text x="360" y="75.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Content saved, published,</text>
