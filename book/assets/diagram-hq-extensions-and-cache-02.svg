<text x="360" y="446.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">notification</text>
<rect x="205" y="520" width="310" height="64" rx="10" fill="#f3f4fb" stroke="none" stroke-width="0" filter="url(#soft)"/>
