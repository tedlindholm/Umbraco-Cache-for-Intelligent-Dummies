<text x="360" y="311.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">DistributedCache broadcasts</text>
<text x="360" y="328.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">instruction</text>
<rect x="205" y="402" width="310" height="64" rx="10" fill="#f3f4fb" stroke="none" stroke-width="0" filter="url(#soft)"/>
