<text x="360" y="193.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">Search custom cache refresher</text>
<text x="360" y="210.5" text-anchor="middle" font-size="13" font-weight="400" fill="#2f3142">payload</text>
<rect x="205" y="284" width="310" height="64" rx="10" fill="#f3f4fb" stroke="none" stroke-width="0" filter="url(#soft)"/>
