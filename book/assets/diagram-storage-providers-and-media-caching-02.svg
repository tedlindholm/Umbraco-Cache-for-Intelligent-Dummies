<svg viewBox="0 0 620 624" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#667eea" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0c4"/>
    </marker>
  </defs>
  <rect width="620" height="624" fill="white"/>
<rect x="-4" y="34" width="104" height="44" rx="10" fill="#f3f4fb" filter="url(#soft)"/>
<text x="48" y="61" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">Visitor</text>
<path d="M48,78 V590" stroke="#dde1f2" stroke-width="2" stroke-dasharray="6 6"/>
<rect x="128" y="34" width="104" height="44" rx="10" fill="#f3f4fb" filter="url(#soft)"/>
<text x="180" y="61" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">CDN</text>
<path d="M180,78 V590" stroke="#dde1f2" stroke-width="2" stroke-dasharray="6 6"/>
<rect x="260" y="34" width="104" height="44" rx="10" fill="#f3f4fb" filter="url(#soft)"/>
<text x="312" y="61" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">Umbraco origin</text>
<path d="M312,78 V590" stroke="#dde1f2" stroke-width="2" stroke-dasharray="6 6"/>
<rect x="392" y="34" width="104" height="44" rx="10" fill="#f3f4fb" filter="url(#soft)"/>
<text x="444" y="61" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3142">Media storage</text>
<path d="M444,78 V590" stroke="#dde1f2" stroke-width="2" stroke-dasharray="6 6"/>
<path d="M48,118 H180" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<text x="114" y="107" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">Request media URL</text>
<rect x="26" y="145" width="568" height="34" rx="8" fill="white" stroke="#dde1f2"/>
<text x="40" y="166" font-size="11" font-weight="700" fill="#667eea">ALT</text>
<text x="310" y="166" text-anchor="middle" font-size="11" font-weight="400" fill="#6b708c">CDN hit</text>
<path d="M180,216 H48" stroke="#9aa0c4" stroke-width="2" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow)"/>
<text x="114" y="205" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">Return cached response</text>
<rect x="26" y="243" width="568" height="34" rx="8" fill="white" stroke="#dde1f2"/>
<text x="40" y="264" font-size="11" font-weight="700" fill="#667eea">ELSE</text>
<text x="310" y="264" text-anchor="middle" font-size="11" font-weight="400" fill="#6b708c">CDN miss</text>
<path d="M180,314 H312" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<text x="246" y="303" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">Request media from origin</text>
<path d="M312,368 H444" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<text x="378" y="348.5" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">Read original media or</text>
<text x="378" y="365.5" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">generated variant</text>
<path d="M312,422 H180" stroke="#9aa0c4" stroke-width="2" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow)"/>
<text x="246" y="411" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">Return response</text>
<path d="M180,476 H48" stroke="#9aa0c4" stroke-width="2" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow)"/>
<text x="114" y="465" text-anchor="middle" font-size="11" font-weight="400" fill="#2f3142">Cache and return response</text>
</svg>
