<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="lineGrad6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="soft6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#667eea" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa0c4"/>
    </marker>
  </defs>

  <rect width="700" height="460" fill="white"/>

  <!-- connectors -->
  <path d="M220,78 V98" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow6)"/>
  <path d="M220,146 V166" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow6)"/>
  <path d="M220,214 V234" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow6)"/>
  <path d="M220,282 V302" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow6)"/>
  <path d="M220,350 V370" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow6)"/>

  <!-- row 1 -->
  <rect x="40" y="30" width="360" height="48" rx="10" fill="#f3f4fb" filter="url(#soft6)"/>
  <rect x="40" y="30" width="6" height="48" rx="3" fill="url(#lineGrad6)"/>
  <text x="220" y="59" text-anchor="middle" font-size="12.5" font-family="Monaco, Menlo, monospace" fill="#333">container.Children().Where(...)</text>

  <!-- row 2 -->
  <rect x="40" y="98" width="360" height="48" rx="10" fill="#f3f4fb" filter="url(#soft6)"/>
  <rect x="40" y="98" width="6" height="48" rx="3" fill="url(#lineGrad6)"/>
  <text x="220" y="127" text-anchor="middle" font-size="13" fill="#333">Resolve child keys</text>

  <!-- row 3 -->
  <rect x="40" y="166" width="360" height="48" rx="10" fill="#f3f4fb" filter="url(#soft6)"/>
  <rect x="40" y="166" width="6" height="48" rx="3" fill="url(#lineGrad6)"/>
  <text x="220" y="195" text-anchor="middle" font-size="13" fill="#333">Load child content one by one</text>

  <!-- row 4 -->
  <rect x="40" y="234" width="360" height="48" rx="10" fill="#f3f4fb" filter="url(#soft6)"/>
  <rect x="40" y="234" width="6" height="48" rx="3" fill="url(#lineGrad6)"/>
  <text x="220" y="263" text-anchor="middle" font-size="13" fill="#333">Resolve references (author/category/image)</text>

  <!-- row 5 -->
  <rect x="40" y="302" width="360" height="48" rx="10" fill="#f3f4fb" filter="url(#soft6)"/>
  <rect x="40" y="302" width="6" height="48" rx="3" fill="url(#lineGrad6)"/>
  <text x="220" y="331" text-anchor="middle" font-size="13" fill="#333">More cache lookups, one per reference</text>

  <!-- row 6: outcome -->
  <rect x="40" y="370" width="360" height="64" rx="10" fill="white" stroke="#667eea" stroke-width="2"/>
  <text x="220" y="396" text-anchor="middle" font-size="13" font-weight="600" fill="#4a4a4a">Possible L2 or database work</text>
  <text x="220" y="414" text-anchor="middle" font-size="12.5" fill="#4a4a4a">for every miss along the way</text>

  <!-- side note -->
  <text x="460" y="60" font-size="12" fill="#999" font-style="italic">one call in the code —</text>
  <text x="460" y="78" font-size="12" fill="#999" font-style="italic">N cache round trips at runtime</text>
</svg>
