<path d="M360,584 C360,611 360,611 360,638" stroke="#9aa0c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<rect x="205" y="48" width="310" height="54" rx="10" fill="#f3f4fb" stroke="none" stroke-width="0" filter="url(#soft)"/>
